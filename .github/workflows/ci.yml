name: Financial Advisor - Continuous Integration

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test-backend:
    name: Build and Test Backend (Java)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar o Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Dar permissão de execução ao Maven Wrapper
        run: chmod +x mvnw

      - name: Rodar Testes Unitários e de Integração
        env:
          TELEGRAM_BOT_TOKEN: dummy_token_para_testes
          TELEGRAM_BOT_USERNAME: dummy_bot_para_testes
          ANALYSIS_SERVICE_URL: http://localhost:5001

          SPRING_PROFILES_ACTIVE: test
          SPRING_DATASOURCE_URL: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
          SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.h2.Driver
          SPRING_DATASOURCE_USERNAME: sa
          SPRING_DATASOURCE_PASSWORD: ""
          SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.H2Dialect
          SPRING_JPA_HIBERNATE_DDL_AUTO: create-drop
        run: ./mvnw clean verify -B

      - name: Construir Imagem Docker do Backend (Sanity Check)
        run: docker build -t financial-backend:latest .

  build-analysis-service:
    name: Build Analysis Service (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./analysis-service

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar o Python (3.9)
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Construir Imagem Docker do Python (Sanity Check)
        run: docker build -t financial-analysis:latest .

  docker-compose-check:
    name: Integração Docker Compose
    runs-on: ubuntu-latest
    needs: [build-and-test-backend, build-analysis-service]

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Validar e Construir com Docker Compose
        run: docker-compose build