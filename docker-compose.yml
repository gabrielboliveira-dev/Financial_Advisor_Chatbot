services:

  backend:
    build: src/main/java/br/com/financialchatbot
    container_name: backend_service
    ports:
      - "8080:8080"
    environment:
      - DB_URL=jdbc:postgresql://db:5432/financialdb
      - DB_USER=gabrielboliveira
      - DB_PASSWORD=SherlockHolmes.221
      - ANALYSIS_SERVICE_URL=http://analysis-service:5001
    depends_on:
      - db
      - analysis-service

  analysis-service:
    build: src/main/java/br/com/financialchatbot/analysis-service
    container_name: analysis_service
    ports:
      - "5001:5001"

  db:
    image: postgres:15
    container_name: financial_db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=financialdb
      - POSTGRES_USER=gabrielboliveira
      - POSTGRES_PASSWORD=SherlockHolmes.221
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: