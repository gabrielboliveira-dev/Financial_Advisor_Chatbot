# Nome da Aplicação
spring.application.name=backend

# URL da API Externa
brapi.api.url=https://brapi.dev/api

# Configuração do Telegram (com nomenclatura correta e usando placeholders)
telegram.bot.token=${TELEGRAM_BOT_TOKEN}
telegram.bot.username=${TELEGRAM_BOT_USERNAME}

# Configuração do Datasource (usando placeholders para todos os valores)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuração do JPA e Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# URL do Serviço Externo de Análise
analysis.service.url=${ANALYSIS_SERVICE_URL}